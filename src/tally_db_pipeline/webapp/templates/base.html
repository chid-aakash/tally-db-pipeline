<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e3a8a">
  <title>{% block title %}Production Entry{% endblock %}</title>
  <link id="favicon" rel="icon" type="image/png" sizes="32x32" href="/static/logos/favicon_aapl_32.png">
  <link id="favicon-large" rel="icon" type="image/png" sizes="180x180" href="/static/logos/favicon_aapl.png">
  <link id="apple-icon" rel="apple-touch-icon" sizes="180x180" href="/static/logos/favicon_aapl.png">
  <script>
    (function () {
      var small = ["/static/logos/favicon_aapl_32.png", "/static/logos/favicon_sepl_32.png"];
      var large = ["/static/logos/favicon_aapl.png",    "/static/logos/favicon_sepl.png"];
      var i = 0;
      setInterval(function () {
        i = (i + 1) % small.length;
        var t = "?t=" + Date.now();
        var s = document.getElementById("favicon");
        var l = document.getElementById("favicon-large");
        var a = document.getElementById("apple-icon");
        if (s) s.href = small[i] + t;
        if (l) l.href = large[i] + t;
        if (a) a.href = large[i] + t;
      }, 4000);
    })();
  </script>
  <style>
    :root {
      --navy-900: #0f1e45;
      --navy-800: #1e3a8a;
      --navy-700: #2743a8;
      --navy-50:  #eef2ff;
      --orange-500: #f97316;
      --orange-400: #fb923c;
      --orange-50:  #fff4e6;
      --ink:        #111827;
      --ink-soft:   #374151;
      --muted:      #6b7280;
      --line:       #e5e7eb;
      --surface:    #ffffff;
      --surface-2:  #f7f8fc;
      --ok:         #16a34a;
      --warn:       #d97706;
      --err:        #dc2626;
      --radius:     10px;
      --shadow-sm:  0 1px 2px rgba(15,30,69,0.06), 0 1px 3px rgba(15,30,69,0.04);
      --shadow-md:  0 6px 18px rgba(15,30,69,0.08), 0 2px 6px rgba(15,30,69,0.05);
      --t-fast:     150ms cubic-bezier(.2,.7,.3,1);
      --t-med:      280ms cubic-bezier(.2,.7,.3,1);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      margin: 0;
      color: var(--ink);
      background: var(--surface-2);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Soft animated background (brand palette). Fixed so it doesn't scroll. */
    .bg-stage {
      position: fixed; inset: 0; z-index: -1; overflow: hidden;
      background:
        radial-gradient(1200px 800px at 110% -10%, rgba(249,115,22,0.08), transparent 60%),
        radial-gradient(900px 700px at -10% 110%, rgba(30,58,138,0.10), transparent 60%),
        linear-gradient(180deg, #fbfbff 0%, #f2f4fb 100%);
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35;
      animation: float 22s ease-in-out infinite;
      will-change: transform;
    }
    .blob.b1 { width: 420px; height: 420px; top: -120px; left: -80px;
      background: radial-gradient(circle at 30% 30%, #93c5fd, transparent 60%); }
    .blob.b2 { width: 360px; height: 360px; bottom: -100px; right: -60px;
      background: radial-gradient(circle at 60% 40%, #fdba74, transparent 60%);
      animation-delay: -8s; animation-duration: 28s; }
    .blob.b3 { width: 300px; height: 300px; top: 40%; left: 55%;
      background: radial-gradient(circle at 50% 50%, #c7d2fe, transparent 60%);
      animation-delay: -14s; animation-duration: 32s; opacity: 0.25; }
    @keyframes float {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(40px,-30px) scale(1.05); }
      66%     { transform: translate(-30px,20px) scale(0.96); }
    }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 10;
      background: linear-gradient(135deg, var(--navy-900) 0%, var(--navy-800) 60%, var(--navy-700) 100%);
      color: #fff;
      padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 12px;
      box-shadow: 0 4px 18px rgba(15,30,69,0.18);
      backdrop-filter: saturate(140%);
    }
    header::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -2px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange-500), transparent);
      background-size: 200% 100%;
      animation: shimmer 6s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .brand-wrap { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brand-logo {
      position: relative; flex: 0 0 42px;
      width: 42px; height: 42px; border-radius: 50%;
      background: #fff; overflow: hidden;
      box-shadow: 0 2px 10px rgba(249,115,22,.35), 0 0 0 2px rgba(255,255,255,.18);
      perspective: 700px;
    }
    .brand-logo::after {
      content:""; position:absolute; inset:-5px; border-radius:50%;
      border:1px dashed rgba(255,255,255,.25);
      animation: logo-ring 9s linear infinite; pointer-events:none;
    }
    .brand-logo .face {
      position: absolute; inset: 5px;
      background-repeat: no-repeat; background-position: center; background-size: contain;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      animation: logo-flip 8s ease-in-out infinite; will-change: transform;
    }
    .brand-logo .face.a { background-image: url("/static/logos/aapl_icon.png"); }
    .brand-logo .face.b { background-image: url("/static/logos/sepl_icon.png"); animation-delay: -4s; }
    @keyframes logo-ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .brand { font-weight: 700; font-size: 1.05rem; letter-spacing: 0.2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand .accent { color: var(--orange-400); }
    /* Hamburger — lives inside the blue header, to the left of the logo. */
    .menu-btn {
      background: rgba(255,255,255,.10);
      color: #fff; cursor: pointer;
      border: 1px solid rgba(255,255,255,.28);
      width: 48px; height: 48px; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: none;
      transition: background var(--t-fast), transform var(--t-fast);
    }
    .menu-btn:hover { background: rgba(255,255,255,.18); transform: none; filter: none; box-shadow: none; }
    .menu-btn:active { transform: scale(.96); }
    .menu-btn svg { width: 30px; height: 30px; pointer-events: none; display: block; stroke: currentColor; }
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(5,10,25,.55); backdrop-filter: blur(2px);
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity var(--t-med);
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top:0; left:0; bottom:0; width: 320px; max-width: 86vw;
      background: linear-gradient(180deg, #0a163b, #15296b);
      color: #fff; z-index: 101;
      transform: translateX(-105%);
      transition: transform var(--t-med);
      box-shadow: 12px 0 40px rgba(0,0,0,.45);
      display: flex; flex-direction: column; padding: 14px 0;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 16px 14px; border-bottom: 1px solid rgba(255,255,255,.08); margin-bottom: 8px;
    }
    .drawer-logo { position: relative; width: 36px; height: 36px; border-radius: 50%;
      background: #fff; overflow: hidden;
      box-shadow: 0 2px 10px rgba(249,115,22,.35); }
    .drawer-logo .face { position: absolute; inset: 4px;
      background-repeat: no-repeat; background-position: center; background-size: contain;
      backface-visibility: hidden;
      animation: logo-flip 8s ease-in-out infinite; }
    .drawer-logo .face.a { background-image: url("/static/logos/aapl_icon.png"); }
    .drawer-logo .face.b { background-image: url("/static/logos/sepl_icon.png"); animation-delay: -4s; }
    @keyframes logo-flip {
      0% { transform: rotateY(0); } 42% { transform: rotateY(0); }
      50% { transform: rotateY(180deg); } 92% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }
    .drawer-close {
      background: transparent; border: none; color: #cbd5e1; cursor: pointer;
      width: 36px; height: 36px; border-radius: 8px;
      display: inline-flex; align-items: center; justify-content: center;
      box-shadow: none;
    }
    .drawer-close:hover { background: rgba(255,255,255,.08); color: #fff; transform: none; filter: none; }
    .drawer-close svg { width: 18px; height: 18px; }
    .drawer-link {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 20px; color: #dbe3f3; text-decoration: none;
      background: transparent; border: none; box-shadow: none;
      font-size: 1rem; font-family: inherit; font-weight: 500;
      cursor: pointer; text-align: left; width: 100%;
      transition: background var(--t-fast), color var(--t-fast), transform var(--t-fast);
    }
    .drawer-link:hover { background: rgba(255,255,255,.08); color: #fff; transform: translateX(2px); filter: none; box-shadow: none; }
    .drawer-link svg { width: 20px; height: 20px; flex: 0 0 20px; opacity: .9; }
    .drawer-sep { height: 1px; background: rgba(255,255,255,.08); margin: 8px 16px; }
    @media (max-width: 640px) {
      .menu-btn { width: 38px; height: 38px; }
      .menu-btn svg { width: 20px; height: 20px; }
    }

    /* Main */
    main {
      padding: 22px 20px 40px;
      max-width: 1400px; margin: 0 auto;
      animation: page-in 420ms cubic-bezier(.2,.7,.3,1) both;
    }
    @keyframes page-in {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    h1 { margin-top: 0; font-size: 1.5rem; color: var(--navy-900); letter-spacing: -0.2px; }

    /* Cards */
    .card {
      background: var(--surface);
      padding: 20px;
      border: 1px solid rgba(30,58,138,0.06);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      transition: transform var(--t-med), box-shadow var(--t-med), border-color var(--t-med);
    }
    .card:hover { box-shadow: var(--shadow-md); border-color: rgba(30,58,138,0.12); }

    /* Forms */
    label { display: block; margin: 10px 0 4px; font-weight: 500; font-size: 0.9rem; color: var(--ink-soft); }
    input[type=text], input[type=date], input[type=number], select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
      transition: border-color var(--t-fast), box-shadow var(--t-fast), background var(--t-fast);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--navy-700);
      box-shadow: 0 0 0 3px rgba(30,58,138,0.15);
    }
    textarea { resize: vertical; min-height: 60px; }

    /* Buttons */
    button, .btn {
      display: inline-block;
      background: linear-gradient(180deg, #2747a5, var(--navy-800));
      color: #fff; border: none;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      text-decoration: none;
      font-family: inherit;
      box-shadow: 0 1px 2px rgba(15,30,69,0.15);
      transition: transform var(--t-fast), box-shadow var(--t-fast), filter var(--t-fast);
    }
    button:hover, .btn:hover { filter: brightness(1.06); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    button:active, .btn:active { transform: translateY(0); filter: brightness(0.98); }
    button:focus-visible, .btn:focus-visible { outline: 3px solid rgba(249,115,22,0.45); outline-offset: 2px; }
    .btn-secondary { background: linear-gradient(180deg, #7b8494, #5b6472); }
    .btn-danger    { background: linear-gradient(180deg, #ef4444, #b91c1c); }
    .btn-success   { background: linear-gradient(180deg, #22c55e, #15803d); }

    /* Tables */
    .table-wrap { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); font-size: 0.9rem; }
    th { background: var(--surface-2); font-weight: 600; color: var(--ink-soft); }
    tbody tr { transition: background var(--t-fast); }
    tbody tr:hover { background: rgba(30,58,138,0.04); }
    tr.has-qty { background: #fff7db; }

    /* Misc */
    .muted { color: var(--muted); font-size: 0.85rem; }
    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 999px;
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.2px;
    }
    .status-draft     { background: #e5e7eb; color: #374151; }
    .status-submitted { background: #dbeafe; color: #1e40af; }
    .status-posted    { background: #dcfce7; color: #166534; }
    .status-failed    { background: #fee2e2; color: #991b1b; }

    .flex-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .section-title { font-weight: 600; margin-top: 20px; margin-bottom: 6px; color: var(--ink-soft); }
    input[type=number] { text-align: right; }
    input.qty-input { background: #fffbeb; }
    pre {
      background: #0f172a; color: #e2e8f0;
      padding: 12px; border-radius: 8px;
      overflow-x: auto; font-size: 0.8rem;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    /* ---- Responsive ---- */
    /* Tablet */
    @media (max-width: 1024px) {
      main { padding: 18px 16px 32px; }
      .card { padding: 16px; }
    }
    /* Phone */
    @media (max-width: 640px) {
      header {
        flex-direction: column; align-items: flex-start;
        padding: 10px 14px; gap: 8px;
      }
      nav { width: 100%; justify-content: flex-start; }
      header a { padding: 8px 10px; font-size: 0.88rem; }
      .brand { font-size: 1rem; }
      main { padding: 14px 12px 28px; }
      h1 { font-size: 1.25rem; }
      .card { padding: 14px; border-radius: 10px; }
      .grid-2 { grid-template-columns: 1fr; gap: 10px; }
      button, .btn { width: 100%; padding: 12px 16px; font-size: 1rem; }
      .flex-row .btn, .flex-row button { width: auto; }
      th, td { padding: 8px 10px; font-size: 0.85rem; }
      input[type=text], input[type=date], input[type=number], select, textarea {
        font-size: 16px; /* prevents iOS zoom on focus */
      }
      .blob { filter: blur(40px); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="bg-stage" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <header>
    <div class="brand-wrap">
      <button id="menu-btn" class="menu-btn" aria-label="Open menu" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="brand-logo" aria-hidden="true">
        <span class="face a"></span>
        <span class="face b"></span>
      </span>
      <span class="brand">Tally <span class="accent">Production</span> Entry</span>
    </div>
  </header>
  <div id="drawer-overlay" class="drawer-overlay" aria-hidden="true"></div>
  <aside id="drawer" class="drawer" role="dialog" aria-label="Main menu">
    <div class="drawer-head">
      <span class="drawer-logo" aria-hidden="true">
        <span class="face a"></span>
        <span class="face b"></span>
      </span>
      <button id="drawer-close" class="drawer-close" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <a class="drawer-link" href="/app">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8l-5-5z"/><path d="M14 3v5h5M12 12v6M9 15h6"/></svg>
      <span>New entry</span>
    </a>
    <a class="drawer-link" href="/entries">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="4" cy="6" r="1.4"/><circle cx="4" cy="12" r="1.4"/><circle cx="4" cy="18" r="1.4"/></svg>
      <span>All entries</span>
    </a>
    <div class="drawer-sep"></div>
    <a class="drawer-link" href="/policies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l8 4v6c0 5-3.5 9.5-8 10-4.5-.5-8-5-8-10V6l8-4z"/><path d="M9 12l2 2 4-4"/></svg>
      <span>Policies</span>
    </a>
    <div class="drawer-sep"></div>
    <a class="drawer-link" href="/production/daily-report">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>
      <span>Daily Production Report</span>
    </a>
    <a class="drawer-link" href="/production/review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      <span>Production Review</span>
    </a>
    <a class="drawer-link" href="/production/processes">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3h0a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8v0a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/></svg>
      <span>Process Config</span>
    </a>
    <a class="drawer-link" href="/production/models">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="9" r="1.2"/><circle cx="15" cy="9" r="1.2"/><circle cx="9" cy="15" r="1.2"/><circle cx="15" cy="15" r="1.2"/></svg>
      <span>Model Specs</span>
    </a>
  </aside>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script>
  (function () {
    var mbtn = document.getElementById("menu-btn");
    var drawer = document.getElementById("drawer");
    var overlay = document.getElementById("drawer-overlay");
    var dclose = document.getElementById("drawer-close");
    if (!mbtn || !drawer || !overlay) return;
    function open()  { drawer.classList.add("open"); overlay.classList.add("open"); document.body.style.overflow = "hidden"; }
    function close() { drawer.classList.remove("open"); overlay.classList.remove("open"); document.body.style.overflow = ""; }
    mbtn.addEventListener("click", open);
    overlay.addEventListener("click", close);
    if (dclose) dclose.addEventListener("click", close);
    document.addEventListener("keydown", function (e) { if (e.key === "Escape") close(); });
  })();
  </script>
</body>
</html>
